name: travel_planner
description: "TripGenie - Smart Travel Planner App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.3.0

  # Networking
  dio: ^5.4.3+1

  # Backend
  supabase_flutter: ^2.3.4

  # Maps (Google Maps)
  google_maps_flutter: ^2.9.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^11.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  cached_network_image: ^3.3.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
